<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vem aí Viva Engage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { min-height:100%; }
body {
  font-family:'Dosis', sans-serif;
  background:#5b63d6;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:24px;
}
.card {
  width:100%; max-width:540px;
  background:linear-gradient(180deg,#CEBEF0 0%, #8B8EE8 50%, #215EDE 100%);
  border-radius:28px;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; align-items:center;
  padding: 8% 7% 6%;
  box-shadow:0 24px 60px rgba(40,40,90,.35);
  color:#fff; text-align:center;
}
.card::before, .card::after{
  content:''; position:absolute; border-radius:50%;
  background:rgba(255,255,255,.16); filter:blur(48px); pointer-events:none;
}
.card::before{ width:42%; aspect-ratio:1; top:-8%; left:-12%; }
.card::after{ width:46%; aspect-ratio:1; bottom:-10%; right:-12%; }
.content{ position:relative; z-index:1; width:100%; display:flex; flex-direction:column; align-items:center; }

.viva-logo{ width:34%; filter:drop-shadow(0 6px 14px rgba(30,40,90,.25)); }
.eyebrow{
  margin-top:6%; font-weight:600; letter-spacing:.42em;
  font-size:clamp(15px,3.6vw,20px); text-indent:.42em;
  text-shadow:0 2px 5px rgba(25,35,95,.28);
}
.title{
  font-weight:800; line-height:1; margin-top:3%;
  font-size:clamp(46px,11vw,62px);
  text-shadow:0 3px 8px rgba(25,35,95,.30);
}
.subtitle{
  font-weight:500; margin-top:4.5%;
  font-size:clamp(22px,5.2vw,30px); line-height:1.25;
  color:#f3f3ff; text-shadow:0 2px 6px rgba(25,35,95,.25);
}

.actions{ width:100%; margin-top:11%; }
.section-label{
  font-weight:600; font-size:clamp(20px,4.8vw,28px);
  margin-bottom:4%; text-shadow:0 2px 6px rgba(25,35,95,.25);
}
.app-row{ display:flex; gap:4%; width:100%; }
.btn{
  display:flex; align-items:center; justify-content:center; gap:12px;
  text-decoration:none; color:#fff;
  background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.92);
  border-radius:999px;
  font-weight:700;
  transition:transform .15s ease, background .15s ease;
  text-shadow:0 1px 4px rgba(25,35,95,.25);
}
.btn:hover{ transform:translateY(-2px); background:rgba(255,255,255,.30); }
.btn svg{ flex:none; }
.btn-app{
  flex:1; padding:5% 2%;
  flex-direction:column; gap:8px;
  font-size:clamp(17px,4vw,22px);
}
.btn-site{
  width:100%; margin-top:5%; padding:5.5% 2%;
  font-size:clamp(22px,5.4vw,30px);
}
.it2b{ width:34%; margin-top:9%; filter:drop-shadow(0 4px 10px rgba(20,30,80,.3)); }

@media (max-width:380px){
  .app-row{ flex-direction:column; gap:14px; }
}
</style>
</head>
